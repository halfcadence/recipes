<header class="site-header" role="banner">
  <div class="wrapper">
    <div class="masthead">
      {%- if page.url == '/' -%}
        <a class="mh-title" rel="author" href="{{ "/" | relative_url }}">Recipes</a>
        <span class="mh-count">124</span>
        <span class="mh-by">by<br>halfcadence</span>
      {%- else -%}
        <nav class="mh-crumb" aria-label="Breadcrumb">
          <a class="mh-back" href="{{ "/" | relative_url }}"><span class="mh-arrow" aria-hidden="true">←</span> index</a>
          {%- if page.category -%}
            <span class="mh-sep" aria-hidden="true">/</span>
            <a class="mh-here" href="{{ site.baseurl }}/#{{ page.category }}">{{ page.category | replace: "soups", "Soups & Hot Pots" | replace: "colophon", "Colophon" | capitalize }}</a>
          {%- endif -%}
        </nav>
      {%- endif -%}
    </div>
  </div>
</header>
