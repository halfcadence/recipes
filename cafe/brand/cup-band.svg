  <g fill="#ff48b0" style="mix-blend-mode:multiply">
    <rect x="40"  y="78" width="16" height="44"/><rect x="140" y="78" width="16" height="44"/><rect x="240" y="78" width="16" height="44"/>
    <rect x="540" y="78" width="16" height="44"/><rect x="640" y="78" width="16" height="44"/><rect x="740" y="78" width="16" height="44"/>
  </g>
  <g fill="#0078bf" style="mix-blend-mode:multiply">
