<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" font-family="'Bricolage Grotesque', sans-serif">
  <rect width="440" height="600" fill="#fbfaf8"/>

  <!-- ===== flat kraft bag, wider (5.5"), top OPEN showing two canelés ===== -->
  <!-- side face (right, shadow) -->
  <polygon points="250,200 320,235 320,540 250,522" fill="#b88f5d"/>
  <!-- front face (left, lit) -->
  <polygon points="250,200 250,522 120,540 120,235" fill="#c9a06a"/>
  <!-- center ridge -->
  <line x1="250" y1="200" x2="250" y2="522" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <!-- left fold -->
  <polygon points="120,235 120,540 130,541 130,236" fill="#000000" opacity="0.06"/>

  <!-- open mouth of the bag (ellipse rim) -->
  <ellipse cx="220" cy="200" rx="100" ry="22" fill="#e7d3b3"/>
  <ellipse cx="220" cy="200" rx="100" ry="22" fill="none" stroke="#a8814f" stroke-width="1.5"/>
  <!-- inside (dark) -->
  <ellipse cx="220" cy="202" rx="92" ry="18" fill="#8f6a44"/>

  <!-- two canelés peeking out of the opening -->
  <g>
    <!-- left canelé -->
    <g transform="translate(192,182)">
      <path d="M -26,18 Q -30,-22 -17,-32 Q 0,-40 17,-32 Q 30,-22 26,18 Z" fill="#5a3a28"/>
      <line x1="-13" y1="-28" x2="-12" y2="16" stroke="#3f2818" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="-32" x2="0" y2="18" stroke="#3f2818" stroke-width="1.5" opacity="0.5"/>
      <line x1="13" y1="-28" x2="12" y2="16" stroke="#3f2818" stroke-width="1.5" opacity="0.5"/>
      <ellipse cx="0" cy="-30" rx="15" ry="6" fill="#6b4631"/>
    </g>
    <!-- right canelé -->
    <g transform="translate(248,186)">
      <path d="M -26,18 Q -30,-22 -17,-32 Q 0,-40 17,-32 Q 30,-22 26,18 Z" fill="#553626"/>
      <line x1="-13" y1="-28" x2="-12" y2="16" stroke="#3a2415" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="-32" x2="0" y2="18" stroke="#3a2415" stroke-width="1.5" opacity="0.5"/>
      <line x1="13" y1="-28" x2="12" y2="16" stroke="#3a2415" stroke-width="1.5" opacity="0.5"/>
      <ellipse cx="0" cy="-30" rx="15" ry="6" fill="#664430"/>
    </g>
  </g>

  <!-- flat bottom seam -->
  <polygon points="120,540 250,522 320,540 250,558" fill="#a8814f"/>
  <line x1="120" y1="540" x2="250" y2="558" stroke="#000000" stroke-width="1" opacity="0.12"/>
  <line x1="250" y1="558" x2="320" y2="540" stroke="#000000" stroke-width="1" opacity="0.12"/>

  <!-- ===== stamp on the front face ===== -->
  <g transform="translate(190,370) rotate(-1)" opacity="0.92">
    <g transform="translate(-8,-56)">
      <rect x="0" y="9" width="16" height="34" rx="2" fill="#ff48b0" style="mix-blend-mode:multiply"/>
      <circle cx="8" cy="9" r="8" fill="#0078bf" style="mix-blend-mode:multiply"/>
    </g>
    <text x="0" y="6" text-anchor="middle" font-size="26" font-weight="700" fill="#0078bf" letter-spacing="-1" style="mix-blend-mode:multiply">half <tspan fill="#ff48b0">/</tspan></text>
    <text x="0" y="34" text-anchor="middle" font-size="26" font-weight="700" fill="#0078bf" letter-spacing="-1" style="mix-blend-mode:multiply">cadence</text>
    <text x="0" y="60" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#cc2464" style="mix-blend-mode:multiply">EAT TODAY</text>
  </g>

  <text x="220" y="585" text-anchor="middle" font-family="monospace" font-size="13" fill="#88898a">wider flat bag (~5.5") · holds two · open, then roll the top</text>
</svg>
