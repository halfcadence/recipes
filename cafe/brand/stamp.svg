<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" font-family="'Bricolage Grotesque', sans-serif">
  <rect width="400" height="400" fill="#fbfaf8"/>
  <!-- ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#0078bf" stroke-width="4"/>
  <!-- canelé glyph, centered -->
  <g transform="translate(168,96)">
    <rect x="0" y="34" width="44" height="92" fill="#ff48b0" style="mix-blend-mode:multiply"/>
    <circle cx="22" cy="34" r="22" fill="#0078bf" style="mix-blend-mode:multiply"/>
  </g>
  <!-- wordmark stacked -->
  <text x="200" y="262" text-anchor="middle" font-size="34" font-weight="600" fill="#0078bf" letter-spacing="-1">half <tspan fill="#ff48b0">/</tspan> cadence</text>
  <text x="200" y="292" text-anchor="middle" font-family="monospace" font-size="14" letter-spacing="3" fill="#435060">CANELES · SEATTLE</text>
  <!-- arc text bottom: the motto -->
  <text x="200" y="332" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="2" fill="#cc2464">EAT TODAY</text>
</svg>
