<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" font-family="'Bricolage Grotesque', sans-serif">
  <rect width="360" height="220" fill="#fbfaf8"/>
  <rect x="8" y="8" width="344" height="204" fill="none" stroke="#cc2464" stroke-width="2"/>
  <!-- small glyph -->
  <g transform="translate(28,30)">
    <rect x="8" y="16" width="18" height="40" fill="#ff48b0" style="mix-blend-mode:multiply"/>
    <circle cx="17" cy="16" r="9" fill="#0078bf" style="mix-blend-mode:multiply"/>
  </g>
  <text x="64" y="58" font-size="26" font-weight="600" fill="#0078bf" letter-spacing="-.5">eat today.</text>
  <line x1="28" y1="86" x2="332" y2="86" stroke="#d2d4d6" stroke-width="1"/>
  <text x="28" y="116" font-family="monospace" font-size="15" fill="#435060">Best within hours of baking.</text>
  <text x="28" y="142" font-family="monospace" font-size="15" fill="#435060">Don't refrigerate — the shell</text>
  <text x="28" y="164" font-family="monospace" font-size="15" fill="#435060">goes soft.</text>
  <text x="28" y="196" font-family="monospace" font-size="13" letter-spacing="2" fill="#cc2464">— half / cadence</text>
</svg>
