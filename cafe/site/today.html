<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Today — Half Cadence</title>
<meta name="description" content="Today's canelé flavors and counts at Half Cadence. Updated live. We sell out — come early.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--blue:#0078bf;--pink:#ff48b0;--over:#cc2464;--paper:#fbfaf8;--ink:#435060;--gray:#88898a;--rule:#d2d4d6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Bricolage Grotesque',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
  a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
  .inkbar{height:14px;background:linear-gradient(to right,var(--over) 0 20%,var(--pink) 20% 40%,var(--blue) 40% 60%,var(--over) 60% 80%,var(--pink) 80% 100%)}
  .wrap{max-width:620px;margin:0 auto;padding:0 24px}

  nav{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--rule)}
  nav .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;color:var(--blue);letter-spacing:-.5px}
  nav .brand .slash{color:var(--pink)}
  nav .glyph{width:18px;height:30px;position:relative;flex:none}
  nav .glyph .body{position:absolute;bottom:0;left:2px;width:14px;height:24px;background:var(--pink);mix-blend-mode:multiply}
  nav .glyph .dome{position:absolute;top:0;left:2px;width:14px;height:14px;border-radius:50%;background:var(--blue);mix-blend-mode:multiply}
  nav .links{display:flex;gap:20px;font-family:ui-monospace,monospace;font-size:14px}
  nav .links a{color:var(--ink)}

  .head{text-align:center;padding:34px 0 10px}
  .head h1{font-size:13px;font-family:ui-monospace,monospace;letter-spacing:4px;color:var(--over);text-transform:uppercase}
  .head .date{font-size:30px;font-weight:800;color:var(--blue);letter-spacing:-1px;margin-top:6px}
  .head .stamp{font-family:ui-monospace,monospace;font-size:13px;color:var(--gray);margin-top:6px}

  .group{margin-top:18px}
  .group-label{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:3px;color:var(--over);border-bottom:1px solid var(--rule);padding-bottom:6px;margin-bottom:4px}

  .flavor{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px dotted var(--rule)}
  .flavor .name{flex:1;font-size:19px}
  .flavor .price{font-family:ui-monospace,monospace;color:var(--over);font-size:15px;width:54px;text-align:right}
  .flavor.out .name{color:var(--gray);text-decoration:line-through;text-decoration-color:var(--pink);text-decoration-thickness:2px}
  .flavor.out .price{color:var(--gray)}

  /* glyph token — inline SVG lifted from the recipe-site illustrations */
  .gl{width:24px;height:40px;flex:none;display:block}
  .gl svg{width:100%;height:100%;display:block}
  .flavor.out .gl{filter:grayscale(1);opacity:.4}

  /* dot grid */
  .dots{display:flex;gap:6px;flex-wrap:wrap;width:130px;justify-content:flex-end}
  .dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--gray)}
  .dot.full{background:var(--over);border-color:var(--over)}
  .soldout{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:2px;color:var(--pink);width:130px;text-align:right}

  .honesty{text-align:center;font-size:21px;color:var(--over);padding:30px 0 8px;line-height:1.4}
  .sub{text-align:center;font-family:ui-monospace,monospace;font-size:13px;color:var(--gray);padding-bottom:30px}

  footer{border-top:1px solid var(--rule);padding:28px 0 56px;font-family:ui-monospace,monospace;font-size:13px;color:var(--gray);text-align:center}
  footer a{color:var(--ink)}
  @media(max-width:520px){.dots,.soldout{width:96px}.flavor .name{font-size:17px}}
</style>
</head>
<body>
<div class="inkbar"></div>
<div class="wrap">

  <nav>
    <a class="brand" href="index.html">
      <span class="glyph"><span class="body"></span><span class="dome"></span></span>
      half <span class="slash">/</span> cadence
    </a>
    <div class="links">
      <a href="index.html">home</a>
      <a href="#" id="reserve">reserve</a>
    </div>
  </nav>

  <div class="head">
    <h1>Today</h1>
    <div class="date" id="date">—</div>
    <div class="stamp" id="stamp">bake 7:30 · open 8:00 · until sold out</div>
  </div>

  <div id="allstars" class="group"></div>
  <div id="rotating" class="group"></div>

  <div class="honesty">Best within hours. We sell out.<br>Come early.</div>
  <div class="sub" id="updated">updated —</div>

  <footer>
    half / cadence · <a href="index.html">home</a> · instagram @halfcadence<br>
    <span>This board is the truth. If it says sold out, it's sold out.</span>
  </footer>

</div>

<script>
/* ───────────────────────────────────────────────────────────
   THE ONLY THING TO EDIT EACH MORNING.
   Set count + total per flavor; the board renders itself.
   Knock counts down through the day (or wire to your POS).
   ─────────────────────────────────────────────────────────── */
const TODAY = {
  date: "Wed 25 Jun",
  updated: "9:14",
  allStars: [
    { name:"vanilla",    glyph:"vanilla",   price:"$4.25", count:6, total:6 },
    { name:"chocolate",  glyph:"chocolate", price:"$4.25", count:4, total:6 },
    { name:"milk tea",   glyph:"milktea",   price:"$4.50", count:3, total:6 },
    { name:"pour over",  glyph:"pour",      price:"$4.50", count:5, total:6 },
  ],
  rotating: [
    { name:"earl grey",          glyph:"earlgrey", price:"$4.50", count:5, total:8 },
    { name:"thai tea",           glyph:"thaitea",  price:"$5.00", count:3, total:8 },
    { name:"eggnog",             glyph:"eggnog",   price:"$5.00", count:0, total:8 },
    { name:"white choc matcha",  glyph:"matcha",   price:"$5.00", count:8, total:8 },
  ],
};

/* Glyph library — the actual 2-shape canelé illustrations from the recipe
   site (assets/illustrations/*.svg), inlined so the board shows the real
   artwork. viewBox 0 0 200 200; multiply on the overlapping shape. */
const MUL = 'style="mix-blend-mode:multiply"';
const GLYPHS = {
  vanilla:   `<rect x="68" y="62" width="52" height="118" fill="#ff48b0" ${MUL}/><circle cx="94" cy="62" r="26" fill="#0078bf" ${MUL}/>`,
  chocolate: `<rect x="65" y="65" width="55" height="115" fill="#0078bf" ${MUL}/><circle cx="93" cy="65" r="28" fill="#ff48b0" ${MUL}/>`,
  milktea:   `<rect x="70" y="55" width="60" height="90" fill="#ff48b0" ${MUL}/><rect x="70" y="120" width="60" height="25" fill="#0078bf" ${MUL}/>`,
  pour:      `<polygon points="50,55 150,55 100,150" fill="#0078bf" ${MUL}/><circle cx="100" cy="150" r="22" fill="#ff48b0" ${MUL}/>`,
  earlgrey:  `<rect x="70" y="55" width="60" height="90" fill="#0078bf" ${MUL}/><circle cx="100" cy="55" r="26" fill="#ff48b0" ${MUL}/>`,
  thaitea:   `<rect x="70" y="55" width="60" height="90" fill="#0078bf" ${MUL}/><rect x="70" y="55" width="60" height="30" fill="#ff48b0" ${MUL}/>`,
  matcha:    `<rect x="65" y="65" width="55" height="115" fill="#0078bf" ${MUL}/><circle cx="93" cy="55" r="25" fill="#ff48b0" ${MUL}/>`,
  eggnog:    `<rect x="65" y="60" width="55" height="120" fill="#ff48b0" ${MUL}/><circle cx="93" cy="60" r="28" fill="#0078bf" ${MUL}/>`,
  mochi:     `<rect x="70" y="40" width="60" height="80" fill="#0078bf" ${MUL}/><rect x="70" y="115" width="60" height="45" fill="#ff48b0" ${MUL}/>`,
};
function glyphHTML(type){
  const shapes = GLYPHS[type] || GLYPHS.vanilla;
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${shapes}</svg>`;
}
function dotsHTML(count,total){
  if(count<=0) return '<div class="soldout">SOLD OUT</div>';
  let s='<div class="dots">';
  for(let i=0;i<total;i++) s+=`<span class="dot${i<count?' full':''}"></span>`;
  return s+'</div>';
}
function flavorHTML(f){
  const out=f.count<=0?' out':'';
  return `<div class="flavor${out}">
    <span class="gl">${glyphHTML(f.glyph)}</span>
    <span class="name">${f.name}</span>
    <span class="price">${f.price}</span>
    ${dotsHTML(f.count,f.total)}
  </div>`;
}
function group(title,items){
  return `<div class="group-label">${title}</div>` + items.map(flavorHTML).join("");
}

function render(data){
  document.getElementById("date").textContent    = data.date || "";
  document.getElementById("updated").textContent = "updated " + (data.updated || "");
  document.getElementById("allstars").innerHTML  = group("ALL-STARS — ALWAYS HERE", data.allStars || []);
  document.getElementById("rotating").innerHTML  = group("TODAY ONLY", data.rotating || []);
}

/* ───────────────────────────────────────────────────────────
   OPTIONAL: live data from a Google Sheet (no API key needed).
   1. Build a sheet with a header row:
        group | name | glyph | price | count | total
      (group = "all-star" or "rotating"; glyph = a key from GLYPHS:
       vanilla chocolate milktea pour earlgrey thaitea matcha eggnog mochi)
   2. Optionally add a "meta" row:  group=meta, name=date, price=<the date>
      and another: group=meta, name=updated, price=<HH:MM>.
   3. File → Share → Publish to web → choose the sheet → CSV → Publish.
   4. Paste that published CSV URL below. Leave "" to use the static
      TODAY object above (works offline / as the fallback).
   ─────────────────────────────────────────────────────────── */
const SHEET_CSV_URL = "";  // e.g. "https://docs.google.com/spreadsheets/d/e/XXXX/pub?gid=0&single=true&output=csv"

// minimal CSV parser (handles quoted fields + commas in quotes)
function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else if(c==='"') q=true;
    else if(c===',') { row.push(cur); cur=""; }
    else if(c==='\n'||c==='\r'){ if(cur!==""||row.length){ row.push(cur); rows.push(row); row=[]; cur=""; } if(c==='\r'&&text[i+1]==='\n')i++; }
    else cur+=c;
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function sheetToData(csv){
  const rows=parseCSV(csv).filter(r=>r.length && r.some(c=>c.trim()!==""));
  if(!rows.length) throw new Error("empty sheet");
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const col=n=>head.indexOf(n);
  const out={ date:TODAY.date, updated:TODAY.updated, allStars:[], rotating:[] };
  for(let i=1;i<rows.length;i++){
    const r=rows[i], g=(r[col("group")]||"").trim().toLowerCase();
    if(g==="meta"){
      const k=(r[col("name")]||"").trim().toLowerCase(), v=(r[col("price")]||"").trim();
      if(k==="date") out.date=v; if(k==="updated") out.updated=v;
      continue;
    }
    const f={
      name:(r[col("name")]||"").trim(),
      glyph:(r[col("glyph")]||"vanilla").trim(),
      price:(r[col("price")]||"").trim(),
      count:parseInt(r[col("count")]||"0",10)||0,
      total:parseInt(r[col("total")]||"0",10)||0,
    };
    if(!f.name) continue;
    (g.startsWith("all")?out.allStars:out.rotating).push(f);
  }
  if(!out.allStars.length && !out.rotating.length) throw new Error("no flavor rows");
  return out;
}

// render the static data immediately, then upgrade from the sheet if configured
render(TODAY);
if(SHEET_CSV_URL){
  fetch(SHEET_CSV_URL,{cache:"no-store"})
    .then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(csv=>render(sheetToData(csv)))
    .catch(e=>console.warn("Sheet load failed, showing static board:", e.message));
}
</script>
</body>
</html>
